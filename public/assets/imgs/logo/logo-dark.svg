<svg width="290" height="40" viewBox="0 0 265 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&amp;display=swap');
      .logo-text { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; text-transform: uppercase; letter-spacing: -0.04em; }
    </style>
    <linearGradient id="blue_grad" x1="0%" y1="0%" x2="100%" y2="0%">
